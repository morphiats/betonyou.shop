<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bet On Yourself | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes liquid {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .animate-bg {
            background: linear-gradient(135deg, #0a1c3a 0%, #020617 50%, #1e3a8a 100%);
            background-size: 300% 300%;
            animation: liquid 12s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        /* Organic wave overlay to soften logo edges */
        .animate-bg::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, transparent 30%, #020617 80%);
            opacity: 0.4;
            pointer-events: none;
        }
    </style>
</head>
<body class="animate-bg text-white min-h-screen flex flex-col justify-between items-center p-6 font-sans selection:bg-white selection:text-slate-900">

    <header class="w-full max-w-6xl flex justify-between items-center py-4">
        <div class="text-xs uppercase tracking-[0.2em] opacity-70 font-semibold">
            Bet On Yourself
        </div>
        <div class="text-xs uppercase tracking-[0.2em] opacity-70 font-semibold">
            Est. 2026
        </div>
    </header>

    <main class="flex flex-col items-center text-center max-w-md mx-auto my-auto space-y-9">
        <div class="w-64 h-64 md:w-80 md:h-80 rounded-2xl overflow-hidden shadow-2xl border border-white/10 transition-transform duration-500 hover:scale-[1.02]">
            <img 
                src="BET ON YOU LOGO.JPG" 
                alt="Bet On Yourself Logo" 
                class="w-full h-full object-cover"
            >
        </div>

        <div class="space-y-3">
            <h1 class="text-3xl md:text-4xl font-bold tracking-tight uppercase">
                Something Big is Cooking
            </h1>
            <p class="text-sm text-slate-400 max-w-sm mx-auto leading-relaxed">
                We are currently building the shop. Drop your email below to get early access to the first collection.
            </p>
        </div>

        <form action="https://formspree.io/f/xykqerdo" method="POST" class="w-full space-y-3">
            <div class="flex flex-col sm:flex-row gap-2">
                <input 
                    type="email" 
                    name="email"
                    required 
                    placeholder="Enter your email" 
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-white/30 text-sm transition-all"
                >
                <button 
                    type="submit" 
                    class="w-full sm:w-auto px-6 py-3 bg-white text-slate-950 font-bold rounded-xl text-sm hover:bg-slate-200 transition-colors uppercase tracking-wider whitespace-nowrap"
                >
                    Join the Club
                </button>
            </div>
        </form>
    </main>

    <footer class="w-full max-w-6xl text-center py-4 text-[10px] tracking-widest text-slate-500 uppercase">
        &copy; 2026 betonyou.shop. All rights reserved.
    </footer>

</body>
</html>
